name: Sprint 10 Reports

on:
  push:
    paths:
      - 'leadpally-api/**'
      - 'leadpally-frontend/**'
      - '.github/workflows/sprint10-reports.yml'
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: leadpally_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pgsql
      - name: Install backend dependencies
        working-directory: leadpally-api
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Verify backend
        working-directory: leadpally-api
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: leadpally_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: file
        run: |
          cp .env.example .env
          php artisan key:generate
          composer dump-autoload
          php artisan optimize:clear || true
          php artisan migrate --seed
          php artisan test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: leadpally-frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: leadpally-frontend
        run: npm ci
      - name: Verify frontend
        working-directory: leadpally-frontend
        run: |
          npm run lint
          npm run build
