name: Sprint 5 CRM Backend

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crm:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: leadpally_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pgsql

      - name: Install dependencies
        working-directory: leadpally-api
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Add CRM migration
        run: |
          cat > leadpally-api/database/migrations/2026_01_03_000001_create_crm_tables.php << 'EOF'
          <?php
          use Illuminate\Database\Migrations\Migration;
          use Illuminate\Database\Schema\Blueprint;
          use Illuminate\Support\Facades\Schema;

          return new class extends Migration {
              public function up(): void {
                  Schema::create('leads', function (Blueprint $table) {
                      $table->id();
                      $table->foreignId('team_id')->constrained()->cascadeOnDelete();
                      $table->foreignId('user_id')->constrained()->cascadeOnDelete();
                      $table->string('name');
                      $table->string('company')->nullable();
                      $table->string('email')->nullable();
                      $table->string('phone')->nullable();
                      $table->string('website')->nullable();
                      $table->text('address')->nullable();
                      $table->string('source')->default('manual');
                      $table->string('status')->default('new');
                      $table->boolean('is_favorite')->default(false);
                      $table->timestamp('follow_up_at')->nullable();
                      $table->timestamps();
                  });
                  Schema::create('lead_notes', function (Blueprint $table) {
                      $table->id();
                      $table->foreignId('lead_id')->constrained()->cascadeOnDelete();
                      $table->foreignId('user_id')->constrained()->cascadeOnDelete();
                      $table->text('body');
                      $table->timestamps();
                  });
                  Schema::create('tags', function (Blueprint $table) {
                      $table->id();
                      $table->foreignId('team_id')->constrained()->cascadeOnDelete();
                      $table->string('name');
                      $table->timestamps();
                      $table->unique(['team_id','name']);
                  });
                  Schema::create('lead_tag', function (Blueprint $table) {
                      $table->id();
                      $table->foreignId('lead_id')->constrained()->cascadeOnDelete();
                      $table->foreignId('tag_id')->constrained()->cascadeOnDelete();
                      $table->unique(['lead_id','tag_id']);
                  });
              }
              public function down(): void {
                  Schema::dropIfExists('lead_tag');
                  Schema::dropIfExists('tags');
                  Schema::dropIfExists('lead_notes');
                  Schema::dropIfExists('leads');
              }
          };
          EOF

      - name: Add CRM models
        run: |
          cat > leadpally-api/app/Models/Lead.php << 'EOF'
          <?php
          namespace App\Models;
          use Illuminate\Database\Eloquent\Model;
          class Lead extends Model {
              protected $fillable=['team_id','user_id','name','company','email','phone','website','address','source','status','is_favorite','follow_up_at'];
              protected $casts=['is_favorite'=>'boolean','follow_up_at'=>'datetime'];
              public function notes(){ return $this->hasMany(LeadNote::class); }
              public function tags(){ return $this->belongsToMany(Tag::class); }
          }
          EOF
          cat > leadpally-api/app/Models/LeadNote.php << 'EOF'
          <?php
          namespace App\Models;
          use Illuminate\Database\Eloquent\Model;
          class LeadNote extends Model { protected $fillable=['lead_id','user_id','body']; }
          EOF
          cat > leadpally-api/app/Models/Tag.php << 'EOF'
          <?php
          namespace App\Models;
          use Illuminate\Database\Eloquent\Model;
          class Tag extends Model { protected $fillable=['team_id','name']; }
          EOF

      - name: Add CRM controller and routes
        run: |
          mkdir -p leadpally-api/app/Http/Controllers/Api/V1/Crm
          cat > leadpally-api/app/Http/Controllers/Api/V1/Crm/LeadController.php << 'EOF'
          <?php
          namespace App\Http\Controllers\Api\V1\Crm;
          use App\Http\Controllers\Controller;
          use App\Models\Lead;
          use App\Models\Tag;
          use Illuminate\Http\JsonResponse;
          use Illuminate\Http\Request;

          class LeadController extends Controller {
              public function index(Request $request): JsonResponse {
                  $teamId=$request->user()->active_team_id; abort_unless($teamId,422,'Please create or switch to a team first.');
                  $leads=Lead::with(['notes','tags'])->where('team_id',$teamId)->latest()->get();
                  return response()->json(['leads'=>$leads]);
              }
              public function store(Request $request): JsonResponse {
                  $teamId=$request->user()->active_team_id; abort_unless($teamId,422,'Please create or switch to a team first.');
                  $data=$request->validate(['name'=>['required','string','max:255'],'company'=>['nullable','string','max:255'],'email'=>['nullable','email'],'phone'=>['nullable','string','max:50'],'website'=>['nullable','string','max:255'],'address'=>['nullable','string'],'source'=>['nullable','string','max:50']]);
                  $lead=Lead::create($data+['team_id'=>$teamId,'user_id'=>$request->user()->id,'source'=>$data['source'] ?? 'manual']);
                  return response()->json(['message'=>'Lead saved.','lead'=>$lead],201);
              }
              public function show(Request $request, Lead $lead): JsonResponse { $this->guard($request,$lead); return response()->json(['lead'=>$lead->load(['notes','tags'])]); }
              public function update(Request $request, Lead $lead): JsonResponse {
                  $this->guard($request,$lead);
                  $data=$request->validate(['name'=>['sometimes','string','max:255'],'status'=>['sometimes','in:new,contacted,qualified,won,lost'],'is_favorite'=>['sometimes','boolean'],'follow_up_at'=>['nullable','date']]);
                  $lead->update($data); return response()->json(['message'=>'Lead updated.','lead'=>$lead->fresh()]);
              }
              public function note(Request $request, Lead $lead): JsonResponse { $this->guard($request,$lead); $data=$request->validate(['body'=>['required','string']]); $note=$lead->notes()->create(['user_id'=>$request->user()->id,'body'=>$data['body']]); return response()->json(['message'=>'Note added.','note'=>$note],201); }
              public function tag(Request $request, Lead $lead): JsonResponse { $this->guard($request,$lead); $data=$request->validate(['name'=>['required','string','max:50']]); $tag=Tag::firstOrCreate(['team_id'=>$lead->team_id,'name'=>$data['name']]); $lead->tags()->syncWithoutDetaching([$tag->id]); return response()->json(['message'=>'Tag added.','tag'=>$tag],201); }
              private function guard(Request $request, Lead $lead): void { abort_unless($request->user()->active_team_id === $lead->team_id,403); }
          }
          EOF
          python3 - << 'PY'
          from pathlib import Path
          p=Path('leadpally-api/routes/api.php')
          s=p.read_text()
          if 'LeadController' not in s:
            s=s.replace('use App\\Http\\Controllers\\Api\\V1\\Search\\SearchController;\n','use App\\Http\\Controllers\\Api\\V1\\Search\\SearchController;\nuse App\\Http\\Controllers\\Api\\V1\\Crm\\LeadController;\n')
          if "Route::get('/leads'" not in s:
            s=s.replace("Route::get('/search/history', [SearchController::class, 'history']);", "Route::get('/search/history', [SearchController::class, 'history']);\n                  Route::get('/leads', [LeadController::class, 'index']);\n                  Route::post('/leads', [LeadController::class, 'store']);\n                  Route::get('/leads/{lead}', [LeadController::class, 'show']);\n                  Route::put('/leads/{lead}', [LeadController::class, 'update']);\n                  Route::post('/leads/{lead}/notes', [LeadController::class, 'note']);\n                  Route::post('/leads/{lead}/tags', [LeadController::class, 'tag']);")
          p.write_text(s)
          PY

      - name: Add CRM tests
        run: |
          mkdir -p leadpally-api/tests/Feature/Crm
          cat > leadpally-api/tests/Feature/Crm/LeadTest.php << 'EOF'
          <?php
          namespace Tests\Feature\Crm;
          use App\Models\Lead;
          use App\Models\Team;
          use App\Models\User;
          use Illuminate\Foundation\Testing\RefreshDatabase;
          use Tests\TestCase;
          class LeadTest extends TestCase {
              use RefreshDatabase;
              private function userWithTeam(): User { $user=User::factory()->create(); $team=Team::create(['owner_id'=>$user->id,'name'=>'HQ','slug'=>'hq-crm']); $team->members()->attach($user->id,['role'=>'owner']); $user->forceFill(['active_team_id'=>$team->id])->save(); return $user; }
              public function test_user_can_save_lead(): void { $user=$this->userWithTeam(); $res=$this->actingAs($user,'sanctum')->postJson('/api/v1/leads',['name'=>'Ada Stores','phone'=>'+2348012345678']); $res->assertCreated()->assertJsonPath('lead.name','Ada Stores'); $this->assertDatabaseHas('leads',['team_id'=>$user->active_team_id,'name'=>'Ada Stores']); }
              public function test_user_can_update_lead_status_and_favorite(): void { $user=$this->userWithTeam(); $lead=Lead::create(['team_id'=>$user->active_team_id,'user_id'=>$user->id,'name'=>'Lead A']); $res=$this->actingAs($user,'sanctum')->putJson('/api/v1/leads/'.$lead->id,['status'=>'contacted','is_favorite'=>true]); $res->assertOk()->assertJsonPath('lead.status','contacted')->assertJsonPath('lead.is_favorite',true); }
              public function test_user_can_add_note_and_tag(): void { $user=$this->userWithTeam(); $lead=Lead::create(['team_id'=>$user->active_team_id,'user_id'=>$user->id,'name'=>'Lead A']); $this->actingAs($user,'sanctum')->postJson('/api/v1/leads/'.$lead->id.'/notes',['body'=>'Called owner'])->assertCreated(); $this->actingAs($user,'sanctum')->postJson('/api/v1/leads/'.$lead->id.'/tags',['name'=>'Hot'])->assertCreated(); $this->assertDatabaseHas('lead_notes',['lead_id'=>$lead->id,'body'=>'Called owner']); $this->assertDatabaseHas('tags',['team_id'=>$user->active_team_id,'name'=>'Hot']); }
          }
          EOF

      - name: Verify backend
        working-directory: leadpally-api
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: leadpally_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: file
        run: |
          cp .env.example .env
          php artisan key:generate
          composer dump-autoload
          php artisan optimize:clear || true
          php artisan migrate --seed
          php artisan test

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Sprint 5A: Add CRM backend"
          git push
