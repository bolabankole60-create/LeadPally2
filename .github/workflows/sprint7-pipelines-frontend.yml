name: Sprint 7 Pipelines Frontend

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: leadpally-frontend/package-lock.json

      - name: Install dependencies
        working-directory: leadpally-frontend
        run: npm ci

      - name: Add pipeline page
        run: |
          mkdir -p leadpally-frontend/src/app/pipelines
          cat > leadpally-frontend/src/app/pipelines/page.tsx << 'EOF'
          'use client';

          import { FormEvent, useMemo, useState } from 'react';
          import api from '@/lib/api';

          type Stage = { id: number; name: string; position: number };
          type Pipeline = { id: number; name: string; stages: Stage[] };
          type Deal = { id: number; title: string; value: string; status: string; pipeline_stage_id: number };
          type Analytics = { open_deals: number; won_deals: number; lost_deals: number; open_value: string; won_value: string };

          export default function PipelinesPage() {
            const [pipelines, setPipelines] = useState<Pipeline[]>([]);
            const [deals, setDeals] = useState<Deal[]>([]);
            const [analytics, setAnalytics] = useState<Analytics | null>(null);
            const [pipelineName, setPipelineName] = useState('Default Sales');
            const [dealTitle, setDealTitle] = useState('');
            const [dealValue, setDealValue] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const activePipeline = pipelines[0];
            const stages = useMemo(() => activePipeline?.stages ?? [], [activePipeline]);

            async function loadData() {
              setLoading(true);
              setError('');
              try {
                const [pipelineResponse, analyticsResponse] = await Promise.all([
                  api.get('/v1/pipelines'),
                  api.get('/v1/pipeline-analytics'),
                ]);
                setPipelines(pipelineResponse.data.pipelines ?? []);
                setAnalytics(analyticsResponse.data);
              } catch {
                setError('Could not load pipelines. Make sure you are logged in and have an active team.');
              } finally {
                setLoading(false);
              }
            }

            async function createPipeline(event: FormEvent<HTMLFormElement>) {
              event.preventDefault();
              setError('');
              try {
                const response = await api.post('/v1/pipelines', { name: pipelineName });
                setPipelines([response.data.pipeline]);
              } catch {
                setError('Could not create pipeline.');
              }
            }

            async function createDeal(event: FormEvent<HTMLFormElement>) {
              event.preventDefault();
              if (!activePipeline || stages.length === 0) {
                setError('Create a pipeline first.');
                return;
              }
              try {
                const response = await api.post('/v1/deals', {
                  pipeline_id: activePipeline.id,
                  pipeline_stage_id: stages[0].id,
                  title: dealTitle,
                  value: Number(dealValue || 0),
                });
                setDeals((current) => [response.data.deal, ...current]);
                setDealTitle('');
                setDealValue('');
              } catch {
                setError('Could not create deal.');
              }
            }

            async function moveDeal(deal: Deal, stageId: number) {
              await api.post(`/v1/deals/${deal.id}/move`, { pipeline_stage_id: stageId });
              setDeals((current) => current.map((item) => item.id === deal.id ? { ...item, pipeline_stage_id: stageId } : item));
            }

            async function closeDeal(deal: Deal, status: 'won' | 'lost') {
              await api.post(`/v1/deals/${deal.id}/close`, { status });
              setDeals((current) => current.map((item) => item.id === deal.id ? { ...item, status } : item));
            }

            return (
              <main className="min-h-screen bg-slate-50 p-6 md:p-8">
                <div className="mx-auto max-w-7xl">
                  <div className="flex flex-col justify-between gap-4 md:flex-row md:items-center">
                    <div>
                      <p className="text-sm font-semibold uppercase tracking-wide text-slate-500">Pipelines</p>
                      <h1 className="mt-2 text-3xl font-bold text-slate-900">Sales Pipeline</h1>
                      <p className="mt-2 text-slate-500">Track deals, revenue, and stage movement.</p>
                    </div>
                    <button onClick={loadData} className="rounded-xl bg-slate-900 px-5 py-3 font-semibold text-white disabled:opacity-50" disabled={loading} type="button">
                      {loading ? 'Loading...' : 'Load pipeline'}
                    </button>
                  </div>

                  <div className="mt-6 grid gap-4 md:grid-cols-5">
                    <div className="rounded-2xl bg-white p-5 shadow-sm"><p className="text-sm text-slate-500">Open Deals</p><p className="mt-2 text-3xl font-bold">{analytics?.open_deals ?? 0}</p></div>
                    <div className="rounded-2xl bg-white p-5 shadow-sm"><p className="text-sm text-slate-500">Won Deals</p><p className="mt-2 text-3xl font-bold">{analytics?.won_deals ?? 0}</p></div>
                    <div className="rounded-2xl bg-white p-5 shadow-sm"><p className="text-sm text-slate-500">Lost Deals</p><p className="mt-2 text-3xl font-bold">{analytics?.lost_deals ?? 0}</p></div>
                    <div className="rounded-2xl bg-white p-5 shadow-sm"><p className="text-sm text-slate-500">Open Value</p><p className="mt-2 text-2xl font-bold">₦{analytics?.open_value ?? 0}</p></div>
                    <div className="rounded-2xl bg-white p-5 shadow-sm"><p className="text-sm text-slate-500">Won Value</p><p className="mt-2 text-2xl font-bold">₦{analytics?.won_value ?? 0}</p></div>
                  </div>

                  {error && <p className="mt-4 rounded-xl bg-red-50 p-4 text-sm text-red-600">{error}</p>}

                  <div className="mt-6 grid gap-4 lg:grid-cols-2">
                    <form onSubmit={createPipeline} className="rounded-2xl bg-white p-5 shadow-sm">
                      <h2 className="font-bold text-slate-900">Create pipeline</h2>
                      <input className="mt-4 w-full rounded-xl border p-3" value={pipelineName} onChange={(event) => setPipelineName(event.target.value)} required />
                      <button className="mt-4 rounded-xl bg-slate-900 px-5 py-3 font-semibold text-white">Create Pipeline</button>
                    </form>
                    <form onSubmit={createDeal} className="rounded-2xl bg-white p-5 shadow-sm">
                      <h2 className="font-bold text-slate-900">Create deal</h2>
                      <div className="mt-4 grid gap-3 md:grid-cols-2">
                        <input className="rounded-xl border p-3" placeholder="Deal title" value={dealTitle} onChange={(event) => setDealTitle(event.target.value)} required />
                        <input className="rounded-xl border p-3" placeholder="Value" value={dealValue} onChange={(event) => setDealValue(event.target.value)} />
                      </div>
                      <button className="mt-4 rounded-xl bg-slate-900 px-5 py-3 font-semibold text-white">Create Deal</button>
                    </form>
                  </div>

                  <div className="mt-8 grid gap-4 lg:grid-cols-4">
                    {stages.map((stage) => (
                      <section key={stage.id} className="rounded-2xl bg-white p-4 shadow-sm">
                        <h2 className="text-sm font-bold uppercase tracking-wide text-slate-500">{stage.name}</h2>
                        <div className="mt-4 space-y-3">
                          {deals.filter((deal) => deal.pipeline_stage_id === stage.id).map((deal) => (
                            <div key={deal.id} className="rounded-xl border border-slate-100 p-4">
                              <h3 className="font-semibold text-slate-900">{deal.title}</h3>
                              <p className="mt-1 text-sm text-slate-500">₦{deal.value} · {deal.status}</p>
                              <select className="mt-3 w-full rounded-lg border p-2 text-sm" value={deal.pipeline_stage_id} onChange={(event) => moveDeal(deal, Number(event.target.value))}>
                                {stages.map((item) => <option key={item.id} value={item.id}>{item.name}</option>)}
                              </select>
                              <div className="mt-3 flex gap-2">
                                <button onClick={() => closeDeal(deal, 'won')} className="rounded-lg bg-green-50 px-3 py-2 text-sm font-semibold text-green-700" type="button">Won</button>
                                <button onClick={() => closeDeal(deal, 'lost')} className="rounded-lg bg-red-50 px-3 py-2 text-sm font-semibold text-red-700" type="button">Lost</button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </section>
                    ))}
                  </div>
                </div>
              </main>
            );
          }
          EOF

      - name: Verify frontend
        working-directory: leadpally-frontend
        run: |
          npm run lint
          npm run build

      - name: Update docs
        run: |
          python3 - << 'PY'
          from pathlib import Path
          ps = Path('PROJECT_STATUS.md')
          if ps.exists():
              s = ps.read_text()
              if '| Sprint 7 - Pipelines & Deals |' not in s:
                  s = s.replace('| Sprint 6 - Dashboard & Analytics | ⏳ Planned |', '| Sprint 6 - Productivity | ✅ Complete |\n| Sprint 7 - Pipelines & Deals | ✅ Complete |')
              ps.write_text(s)
          ch = Path('CHANGELOG.md')
          if ch.exists():
              s = ch.read_text()
              if '## [Sprint 7B] - Pipelines Frontend' not in s:
                  s = s.replace('## [Sprint 5B] - CRM Frontend', '## [Sprint 7B] - Pipelines Frontend\n\n### Added\n- Pipeline dashboard UI\n- Deal creation form\n- Kanban-style stage columns\n- Deal movement controls\n- Win/loss actions\n- Pipeline analytics cards\n\n---\n\n## [Sprint 5B] - CRM Frontend')
              ch.write_text(s)
          PY

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Sprint 7B: Add pipelines frontend"
          git push
